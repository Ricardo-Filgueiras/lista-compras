<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Checkout | Stationery Co.</title>
<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Minimalist Look -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-typography">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    /* Hide scrollbar for cleaner look */
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
<style data-purpose="layout-adjustments">
    /* Ensuring the main content accounts for sticky footer height */
    main {
      padding-bottom: 120px;
    }
    /* Simple animation for quantity feedback */
    .qty-btn:active {
      transform: scale(0.95);
    }
  </style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/></head>
<body class="bg-gray-50 text-gray-900 antialiased">
<!-- BEGIN: MainHeader -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-4 flex items-center justify-between">
<button aria-label="Go back" class="p-2 -ml-2 text-gray-600">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-lg font-semibold tracking-tight">Shopping Cart</h1>
<button aria-label="Clear all" class="text-sm font-medium text-red-500 px-2">Clear</button>
</header>
<!-- END: MainHeader -->
<main class="max-w-md mx-auto">
<!-- BEGIN: CartItemsList -->
<section class="mt-2 space-y-1" data-purpose="cart-items-container">
<!-- Item 1: Fountain Pen -->
<article class="bg-white border-b border-gray-100 p-4 flex gap-4 items-center" data-purpose="cart-item">
<div class="flex-shrink-0 w-20 h-20 bg-gray-100 rounded-lg overflow-hidden border border-gray-50">
<div class="w-full h-full flex items-center justify-center text-gray-400"><span class="material-symbols-outlined text-3xl">fountain_pen</span></div>
</div>
<div class="flex-grow min-w-0">
<div class="flex justify-between items-start">
<h2 class="text-sm font-medium text-gray-800 truncate">Studio Series Fountain Pen</h2>
<button aria-label="Swap item" class="text-gray-300 hover:text-black p-1 mr-1 transition-colors"><span class="material-symbols-outlined text-lg leading-none">sync</span></button><button aria-label="Remove item" class="text-gray-300 hover:text-red-400 p-1">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<p class="text-xs text-gray-400 mt-1">Midnight Blue / Fine Nib</p>
<div class="flex justify-between items-end mt-3">
<span class="text-sm font-semibold">$24.00</span>
<!-- Quantity Control -->
<div class="flex items-center border border-gray-200 rounded-full bg-gray-50 overflow-hidden" data-purpose="quantity-selector">
<button aria-label="Decrease quantity" class="qty-btn px-3 py-1 text-gray-500 hover:bg-gray-100 transition-colors">−</button>
<span class="px-2 text-xs font-semibold w-6 text-center">1</span>
<button aria-label="Increase quantity" class="qty-btn px-3 py-1 text-gray-500 hover:bg-gray-100 transition-colors">+</button>
</div>
</div>
</div>
</article>
<!-- Item 2: Notebook -->
<article class="bg-white border-b border-gray-100 p-4 flex gap-4 items-center" data-purpose="cart-item">
<div class="flex-shrink-0 w-20 h-20 bg-gray-100 rounded-lg overflow-hidden border border-gray-50">
<div class="w-full h-full flex items-center justify-center text-gray-400"><span class="material-symbols-outlined text-3xl">menu_book</span></div>
</div>
<div class="flex-grow min-w-0">
<div class="flex justify-between items-start">
<h2 class="text-sm font-medium text-gray-800 truncate">A5 Hardcover Grid Notebook</h2>
<button aria-label="Swap item" class="text-gray-300 hover:text-black p-1 mr-1 transition-colors"><span class="material-symbols-outlined text-lg leading-none">sync</span></button><button aria-label="Remove item" class="text-gray-300 hover:text-red-400 p-1">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<p class="text-xs text-gray-400 mt-1">Light Grey / 120 GSM</p>
<div class="flex justify-between items-end mt-3">
<span class="text-sm font-semibold">$18.50</span>
<!-- Quantity Control -->
<div class="flex items-center border border-gray-200 rounded-full bg-gray-50 overflow-hidden" data-purpose="quantity-selector">
<button aria-label="Decrease quantity" class="qty-btn px-3 py-1 text-gray-500 hover:bg-gray-100 transition-colors">−</button>
<span class="px-2 text-xs font-semibold w-6 text-center">2</span>
<button aria-label="Increase quantity" class="qty-btn px-3 py-1 text-gray-500 hover:bg-gray-100 transition-colors">+</button>
</div>
</div>
</div>
</article>
<!-- Item 3: Washi Tape -->
<article class="bg-white border-b border-gray-100 p-4 flex gap-4 items-center" data-purpose="cart-item">
<div class="flex-shrink-0 w-20 h-20 bg-gray-100 rounded-lg overflow-hidden border border-gray-50">
<div class="w-full h-full flex items-center justify-center text-gray-400"><span class="material-symbols-outlined text-3xl">texture</span></div>
</div>
<div class="flex-grow min-w-0">
<div class="flex justify-between items-start">
<h2 class="text-sm font-medium text-gray-800 truncate">Neutral Washi Tape Set</h2>
<button aria-label="Swap item" class="text-gray-300 hover:text-black p-1 mr-1 transition-colors"><span class="material-symbols-outlined text-lg leading-none">sync</span></button><button aria-label="Remove item" class="text-gray-300 hover:text-red-400 p-1">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<p class="text-xs text-gray-400 mt-1">Set of 5 / Geometric</p>
<div class="flex justify-between items-end mt-3">
<span class="text-sm font-semibold">$12.00</span>
<!-- Quantity Control -->
<div class="flex items-center border border-gray-200 rounded-full bg-gray-50 overflow-hidden" data-purpose="quantity-selector">
<button aria-label="Decrease quantity" class="qty-btn px-3 py-1 text-gray-500 hover:bg-gray-100 transition-colors">−</button>
<span class="px-2 text-xs font-semibold w-6 text-center">1</span>
<button aria-label="Increase quantity" class="qty-btn px-3 py-1 text-gray-500 hover:bg-gray-100 transition-colors">+</button>
</div>
</div>
</div>
</article>
</section>
<!-- END: CartItemsList -->
<!-- BEGIN: OrderSummary -->
<section class="p-6 bg-white mt-2 space-y-3" data-purpose="checkout-summary">
<div class="flex justify-between text-sm">
<span class="text-gray-500">Subtotal</span>
<span class="text-gray-800 font-medium">$73.00</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-gray-500">Shipping</span>
<span class="text-gray-800 font-medium">$5.00</span>
</div>
<div class="pt-3 border-t border-gray-100 flex justify-between text-base">
<span class="font-semibold">Estimated Total</span>
<span class="font-bold text-gray-900">$78.00</span>
</div>
</section>
<!-- END: OrderSummary -->
</main>
<!-- BEGIN: StickyFooter -->
<footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-8 z-50">
<div class="max-w-md mx-auto flex items-center flex-col gap-3">
<div class="flex flex-col items-center">
<span class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Total</span>
<span class="text-xl font-bold text-gray-900">$78.00</span>
</div>
<button class="bg-black text-white px-8 py-4 rounded-xl font-semibold text-sm active:bg-gray-800 transition-colors flex-grow shadow-lg shadow-gray-200 w-full" data-purpose="finalize-order-button">
        Finalize Order
      </button>
</div>
</footer>
<!-- END: StickyFooter -->
</body></html>
