<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6" hx-get="{% url 'shopping:list_totals' list.uuid %}" hx-trigger="update-totals from:body" hx-swap="outerHTML">
    <div class="flex flex-col md:flex-row items-center gap-8">
        <div class="flex flex-col items-center md:items-start">
            <span class="mono-label text-[10px]">Total do Carrinho</span>
            <span class="text-3xl font-display font-bold tracking-tight">R$ {{ total_all|floatformat:2 }}</span>
        </div>
        <div class="px-5 py-2 bg-accent-sage/10 rounded-xl border border-accent-sage/20 hidden md:block">
            <span class="mono-label text-[10px] text-accent-sage mb-0.5 block">Economia PIX (-10%)</span>
            <span class="text-sm font-bold text-accent-sage">R$ {{ total_pix|floatformat:2 }} via Transferência</span>
        </div>
    </div>

    {% if not list.is_locked %}
    <form method="post" action="{% url 'shopping:list_edit' list.uuid %}" class="w-full md:w-auto">
        {% csrf_token %}
        <input type="hidden" name="name" value="{{ list.name }}">
        <input type="hidden" name="is_locked" value="True">
        <div class="beam-btn">
            <span class="beam-spinner"></span>
            <button type="submit" class="beam-inner !py-3.5 !px-10">
                Concluir Seleção e Fechar Pedido
            </button>
        </div>
    </form>
    {% else %}
    <div class="px-8 py-3.5 bg-accent-sage text-white rounded-full font-bold text-[10px] uppercase tracking-widest flex items-center gap-2">
        <iconify-icon icon="solar:check-circle-bold" class="text-base"></iconify-icon>
        Lista Concluída
    </div>
    {% endif %}
</div>
