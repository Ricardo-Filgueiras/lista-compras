{% extends 'shopping/base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-bold text-slate-900 mb-6">Importar Catálogo (CSV)</h1>
        
        <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-8">
            <h3 class="font-bold text-blue-800 mb-2">Instruções de Formato</h3>
            <p class="text-sm text-blue-700">O arquivo deve ser um CSV com o seguinte cabeçalho (UTF-8):</p>
            <code class="block bg-blue-100 p-2 mt-2 rounded text-xs text-blue-900">
                name,price,category,stock,barcode,image_url
            </code>
        </div>

        <form action="{% url 'shopping:import_products_csv' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">Selecione o arquivo</label>
                <input type="file" name="file" accept=".csv" required
                       class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer">
            </div>

            <div class="flex gap-4">
                <button type="submit" class="flex-1 bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition shadow-lg shadow-orange-200">
                    Processar Importação
                </button>
                <a href="{% url 'shopping:admin_dashboard' %}" class="px-6 py-3 border border-slate-200 rounded-xl text-slate-600 font-bold hover:bg-slate-50 transition">
                    Voltar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
