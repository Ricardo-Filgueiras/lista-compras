{% extends 'shopping/base.html' %}
{% block title %}Excluir Item · Lista de Compras{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center py-12">
  <div class="auth-glass w-full max-w-md p-10 text-center reveal active" style="border-color: rgba(200,80,80,0.2);">
    <div class="w-14 h-14 rounded-2xl bg-red-50 flex items-center justify-center text-2xl mx-auto mb-5">
        <iconify-icon icon="solar:danger-triangle-bold-duotone" class="text-red-500"></iconify-icon>
    </div>
    <h1 class="text-2xl font-display font-bold tracking-tighter mb-2">Excluir Item</h1>
    <p class="text-sm text-obsidian-400 mb-8">
        Excluir <strong class="text-obsidian-900">{{ item.name }}</strong> da lista <strong class="text-obsidian-900">{{ list.name }}</strong>?
    </p>

    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <a href="{% url 'shopping:list_detail' list.uuid %}" class="flex-1 px-6 py-3.5 rounded-xl border border-obsidian-200 text-[10px] font-bold uppercase tracking-widest hover:bg-obsidian-50 transition-all">
          Cancelar
      </a>
      <button type="submit" class="flex-1 px-6 py-3.5 rounded-xl bg-red-500 text-white text-[10px] font-bold uppercase tracking-widest hover:bg-red-600 transition-all">
          Sim, excluir
      </button>
    </form>
  </div>
</div>
{% endblock %}
