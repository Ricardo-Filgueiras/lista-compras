{% extends 'shopping/base.html' %}
{% block title %}Entrar · Lista de Compras{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🛒</div>
      <h1 class="auth-title">Lista de Compras</h1>
      <p class="auth-subtitle">Faça login para gerenciar suas compras</p>
    </div>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary btn-full" id="btn-login">Entrar</button>
    </form>

    <div class="auth-footer">
      <p>Não tem conta? <a href="{% url 'register' %}">Criar conta</a></p>
    </div>
  </div>
</div>
{% endblock %}
