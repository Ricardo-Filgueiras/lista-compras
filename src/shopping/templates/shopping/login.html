{% extends 'shopping/base.html' %}
{% block title %}Entrar · Projeto Lista{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12">
  <div class="auth-glass w-full max-w-md p-10 md:p-12 reveal active">
    <div class="text-center mb-10">
        <div class="w-14 h-14 rounded-2xl bg-obsidian-900 text-white flex items-center justify-center text-2xl mx-auto mb-5">
            <iconify-icon icon="solar:user-circle-bold-duotone"></iconify-icon>
        </div>
        <span class="mono-label block mb-2">Acesso Seguro</span>
        <h1 class="text-3xl font-display font-bold tracking-tighter">
            Bem-vindo <span class="text-accent-warm">De Volta</span>
        </h1>
    </div>

    <form method="post" class="space-y-5">
      {% csrf_token %}
      {% for field in form %}
      <div class="space-y-2">
        <label class="mono-label text-obsidian-900 text-[10px] ml-1">{{ field.label }}</label>
        {{ field }}
      </div>
      {% endfor %}

      <div class="pt-4">
          <div class="beam-btn w-full">
              <span class="beam-spinner"></span>
              <button type="submit" class="beam-inner w-full justify-center">
                Entrar na Plataforma
              </button>
          </div>
      </div>
    </form>

    <div class="mt-10 pt-6 border-t border-obsidian-100 text-center">
      <p class="text-xs font-semibold text-obsidian-400 uppercase tracking-widest">
        Não tem uma conta?
        <a href="{% url 'register' %}" class="text-obsidian-900 hover:text-accent-warm underline transition-colors">Criar agora</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.auth-glass input').forEach(el => {
      el.className = 'obsidian-input';
    });
  });
</script>
{% endblock %}
